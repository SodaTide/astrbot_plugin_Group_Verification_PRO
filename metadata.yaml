name: astrbot_plugin_GroupVerification
display_name: QQ群成员入群验证
author: SodaTide
version: 26.4.23
description: |
  通过异步任务机制和智能问答策略，自动化管理 QQ 群新成员入群验证，有效防止机器人和广告号。该插件不仅支持分时段差异化超时设置（如高峰期缩短验证时间）、低 QQ 等级成员强制验证、防刷屏保护（限制未验证成员发送无关消息的数量）、答错后命中免验证时段的可配置处理策略，以及多级提醒机制（倒计时警告、失败重试、强制踢出）。新增功能：实时撤回无关消息、自动撤回机器人验证消息。
# repo_url: https://github.com/huntuo146/astrbot_plugin_Group-Verification_PRO
